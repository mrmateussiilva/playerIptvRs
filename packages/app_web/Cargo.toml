[package]
name = "app_web"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
dioxus = { version = "0.7", default-features = false, features = ["macro", "html", "hooks", "launch", "web"] }
dioxus-signals = "0.7"
gloo-net = { version = "0.6" }
iptv_core = { path = "../core" }
js-sys = "0.3"
serde.workspace = true
serde_json.workspace = true
wasm-bindgen = { version = "0.2" }
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Document", "Element", "File", "FileList", "HtmlInputElement", "Storage", "Window", "ReadableStream", "ReadableStreamDefaultReader", "TextDecoder"] }
